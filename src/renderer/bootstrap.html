<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self';">
  <title>UmuCraft — Inicializando</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d1117; --bg-card: #161b22; --border: #30363d;
      --accent: #4ade80; --accent-dim: #4ade8044;
      --text: #e6edf3; --text-dim: #8b949e;
      --danger: #f85149; --warn: #e3b341;
    }
    html, body {
      height: 100%; width: 100%; overflow: hidden;
      background: var(--bg); color: var(--text);
      font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
      font-size: 13px; user-select: none;
    }
    .titlebar {
      height: 28px; display: flex; align-items: center;
      padding: 0 12px; background: #080c10;
      border-bottom: 1px solid var(--border);
      -webkit-app-region: drag;
      font-size: 11px; color: var(--text-dim); letter-spacing: 0.04em;
    }
    .container {
      display: flex; flex-direction: column;
      height: calc(100% - 28px); padding: 20px 24px 16px;
    }
    .header {
      display: flex; align-items: center; gap: 12px; margin-bottom: 16px;
    }
    .spinner {
      width: 22px; height: 22px; border: 2.5px solid var(--border);
      border-top-color: var(--accent); border-radius: 50%;
      animation: spin 0.7s linear infinite; flex-shrink: 0;
    }
    .spinner.hidden { display: none; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .title {
      font-size: 16px; font-weight: 700; letter-spacing: 0.04em;
    }
    .state-label {
      font-size: 12px; color: var(--text-dim); margin-bottom: 8px;
      min-height: 16px;
    }
    .state-label.error { color: var(--danger); }
    .state-label.success { color: var(--accent); }

    /* Progress bar */
    .progress-wrap {
      height: 5px; background: var(--border); border-radius: 3px;
      overflow: hidden; margin-bottom: 12px;
    }
    .progress-bar {
      height: 100%; width: 0%; background: var(--accent);
      border-radius: 3px; transition: width 0.2s;
    }
    .progress-bar.pulse {
      width: 30%;
      animation: pulse 1.4s ease-in-out infinite;
    }
    @keyframes pulse {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(400%); }
    }
    .progress-detail {
      font-size: 11px; color: var(--text-dim); margin-bottom: 10px;
      min-height: 14px;
    }

    /* Log area */
    .log-area {
      flex: 1; overflow-y: auto; overflow-x: hidden;
      background: #0a0e14; border: 1px solid var(--border);
      border-radius: 6px; padding: 8px 10px;
      font-family: 'Consolas', 'Courier New', monospace;
      font-size: 11px; line-height: 1.5; color: var(--text-dim);
    }
    .log-area .log-line { white-space: pre-wrap; word-break: break-all; }
    .log-area .log-line.error { color: var(--danger); }
    .log-area .log-line.state { color: var(--accent); }

    /* Actions */
    .actions {
      display: flex; gap: 8px; margin-top: 12px; justify-content: flex-end;
    }
    .actions.hidden { display: none; }
    .btn {
      padding: 6px 16px; border: 1px solid var(--border);
      border-radius: 6px; background: var(--bg-card);
      color: var(--text); font-size: 12px; cursor: pointer;
      font-family: inherit; transition: all 0.15s;
    }
    .btn:hover { background: #1c2333; border-color: var(--accent); }
    .btn.primary {
      background: var(--accent); color: #000; border-color: var(--accent);
      font-weight: 600;
    }
    .btn.primary:hover { background: #6ef799; }
  </style>
</head>
<body>
  <div class="titlebar">UmuCraft Launcher — Bootstrap</div>
  <div class="container">
    <div class="header">
      <div class="spinner" id="spinner"></div>
      <div class="title">Verificando ambiente Java...</div>
    </div>
    <div class="state-label" id="state-label">Iniciando verificacao...</div>
    <div class="progress-wrap">
      <div class="progress-bar pulse" id="progress-bar"></div>
    </div>
    <div class="progress-detail" id="progress-detail"></div>
    <div class="log-area" id="log-area"></div>
    <div class="actions hidden" id="actions">
      <button class="btn" id="logs-btn">Abrir logs</button>
      <button class="btn primary" id="retry-btn">Tentar novamente</button>
    </div>
  </div>
  <script src="bootstrap-renderer.js"></script>
</body>
</html>
